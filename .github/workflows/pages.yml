# Собирает статику в _site и подставляет URL Web App из секрета (config.js в репо нет).
# Настройка: Settings → Secrets and variables → Actions → New repository secret: APPS_SCRIPT_URL
# Settings → Pages → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Собрать сайт и config.js из секрета
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          mkdir -p _site
          node -e "
            const fs = require('fs');
            const u = process.env.APPS_SCRIPT_URL || '';
            if (!u) {
              console.error('Секрет APPS_SCRIPT_URL пустой. Добавьте в Settings → Secrets → Actions.');
              process.exit(1);
            }
            fs.writeFileSync('_site/config.js', 'window.APPS_SCRIPT_URL = ' + JSON.stringify(u) + ';\\n');
          "
          cp index.html dashboard.html script.js style.css logo.png favicon.ico _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
