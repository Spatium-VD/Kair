<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <title>Вход — Детализация выплат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./style.css?v=14" rel="stylesheet">
  </head>
  <body>
    <header class="app-topbar">
      <div class="app-topbar-inner">
        <a href="./index.html" class="brand" aria-label="Синержи «Моя зарплата» — на главную">
          <img class="brand-logo" src="./logo.png" width="40" height="40" alt="" />
          <span class="brand-text">
            <span class="brand-name">Синержи «Моя зарплата»</span>
            <span class="brand-tag">Детализация выплат</span>
          </span>
        </a>
      </div>
    </header>

    <div class="page">
      <div class="card-app card-login">
        <div class="app-header">
          <h1 class="h4 m-0">Вход в личный кабинет</h1>
        </div>
        <div class="app-body">
          <form id="loginForm" autocomplete="off">
            <div class="mb-3">
              <label class="form-label" for="fioInput">ФИО</label>
              <input id="fioInput" class="form-control" type="text" required placeholder="Например, Иванов Иван Иванович" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="pinInput">PIN-код</label>
              <input id="pinInput" class="form-control" type="password" inputmode="numeric" maxlength="4" required placeholder="4 цифры" />
            </div>
            <div class="d-grid gap-2">
              <button id="loginBtn" class="btn btn-accent" type="submit">Войти</button>
              <div id="loginSpinner" class="text-center mt-1" style="display:none;">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Загрузка...</span>
                </div>
              </div>
            </div>
            <div id="errorBox" class="error-box mt-3" style="display:none;"></div>
          </form>
        </div>
      </div>
    </div>

    <script src="./config.js?v=5"></script>
    <script src="./script.js?v=14"></script>
  </body>
</html>
