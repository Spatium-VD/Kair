<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Вход сотрудников</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
  </head>
  <body>
    <div class="page">
      <div class="card-app">
        <div class="app-header">
          <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
            <h1 class="h4 m-0">Детализация выплат</h1>
          </div>
          <div class="text-muted mt-1">Авторизация по ФИО</div>
        </div>
        <div class="app-body">
          <form id="loginForm" autocomplete="off">
            <div class="mb-3">
              <label class="form-label" for="fioInput">ФИО</label>
              <input id="fioInput" class="form-control" type="text" required placeholder="Например, Иванов И.И." />
            </div>

            <div class="d-grid gap-2">
              <button id="loginBtn" class="btn btn-accent btn-primary" type="submit">
                Войти
              </button>
              <div id="loginSpinner" class="text-center mt-1" style="display:none;">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Загрузка...</span>
                </div>
              </div>
            </div>

            <div id="errorBox" class="error-box mt-3" style="display:none;"></div>
          </form>
        </div>
      </div>
    </div>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
