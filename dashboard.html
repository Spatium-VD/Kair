<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Детализация выплат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
  </head>
  <body>
    <div class="page">
      <div class="card-app">
        <div class="app-header">
          <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
            <div>
              <h1 class="h4 m-0" id="greeting">Здравствуйте</h1>
              <div class="text-muted mt-1">Детализация выплат и корректировок</div>
            </div>
            <div class="d-flex gap-2 align-items-center">
              <button id="logoutBtn" class="btn btn-outline-danger" type="button">Выйти</button>
            </div>
          </div>
        </div>

        <div class="app-body">
          <div id="dataSpinner" class="text-center my-2" style="display:none;">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Загрузка...</span>
            </div>
          </div>

          <div class="filters mt-2">
            <div>
              <label class="form-label mb-1" for="dateFrom">С даты</label>
              <input id="dateFrom" class="form-control" type="date" />
            </div>
            <div>
              <label class="form-label mb-1" for="dateTo">По дату</label>
              <input id="dateTo" class="form-control" type="date" />
            </div>
            <div>
              <label class="form-label mb-1" for="typeSelect">Тип выплаты</label>
              <select id="typeSelect" class="form-select">
                <option value="ALL">Все</option>
              </select>
            </div>
            <div>
              <label class="form-label mb-1" for="totalSum">Итог</label>
              <input id="totalSum" class="form-control" value="0" disabled />
            </div>
          </div>

          <div class="table-wrap mt-3">
            <table class="table table-sm mb-0">
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Тип выплаты</th>
                  <th class="text-end">Сумма</th>
                  <th>Статус</th>
                  <th>Комментарий</th>
                </tr>
              </thead>
              <tbody id="paymentsTbody">
                <tr>
                  <td colspan="5" class="text-muted text-center py-4">Нет данных</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="dashboardError" class="error-box mt-3" style="display:none;"></div>
        </div>
      </div>
    </div>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
