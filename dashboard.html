<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <title>Дашборд — Детализация выплат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./style.css?v=11" rel="stylesheet">
  </head>
  <body>
    <header class="app-topbar">
      <div class="app-topbar-inner">
        <a href="./dashboard.html" class="brand" aria-label="Синержи «Моя зарплата»">
          <img class="brand-logo" src="./logo.png" width="40" height="40" alt="" />
          <span class="brand-text">
            <span class="brand-name">Синержи «Моя зарплата»</span>
            <span class="brand-tag">Детализация выплат</span>
          </span>
        </a>
        <div class="topbar-actions">
          <button id="logoutBtn" class="btn-topbar-logout" type="button">Выйти</button>
        </div>
      </div>
    </header>

    <div class="page page-dashboard">
      <div class="card-app">
        <div class="app-header">
          <h1 class="h4 m-0" id="greeting">Здравствуйте</h1>
          <div class="text-muted mt-1 small" id="userProjects"></div>
        </div>

        <div class="app-body">
          <div id="dataSpinner" class="text-center my-4" style="display:none;">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Загрузка...</span>
            </div>
          </div>

          <div class="filter-card mb-3">
            <div class="filter-card-title">Период</div>
            <div class="filter-presets" id="datePresets" role="group" aria-label="Быстрый выбор периода">
              <button type="button" class="btn-filter-preset" data-preset="thisMonth">Этот месяц</button>
              <button type="button" class="btn-filter-preset" data-preset="lastMonth">Прошлый месяц</button>
              <button type="button" class="btn-filter-preset" data-preset="thisQuarter">Этот квартал</button>
              <button type="button" class="btn-filter-preset" data-preset="last3Months">3 месяца</button>
              <button type="button" class="btn-filter-preset" data-preset="thisYear">Этот год</button>
              <button type="button" class="btn-filter-preset" data-preset="all">Всё время</button>
            </div>
            <div class="filters filters-custom">
              <div class="filter-date-field">
                <label class="form-label mb-1" for="dateFrom">С даты</label>
                <input id="dateFrom" class="form-control form-control-sm" type="date" autocomplete="off" />
              </div>
              <div class="filter-date-field">
                <label class="form-label mb-1" for="dateTo">По дату</label>
                <input id="dateTo" class="form-control form-control-sm" type="date" autocomplete="off" />
              </div>
              <div class="filter-date-actions">
                <button id="applyDatesBtn" type="button" class="btn btn-accent btn-sm">Показать</button>
                <button id="resetDatesBtn" type="button" class="btn btn-outline-secondary btn-sm">Сбросить даты</button>
              </div>
            </div>
          </div>
          <div id="dateHint" class="text-muted small mb-2" style="display:none;"></div>

          <div class="section-card" id="fotSection">
            <div class="section-title">Зарплата (ФОТ)</div>
            <div class="table-wrap">
              <table class="table table-sm mb-0">
                <thead>
                  <tr>
                    <th>Период</th>
                    <th>Тип</th>
                    <th class="text-end">Сумма</th>
                    <th>Статус</th>
                  </tr>
                </thead>
                <tbody id="fotTbody">
                  <tr><td colspan="4" class="text-muted text-center py-3">Нет данных</td></tr>
                </tbody>
              </table>
            </div>
            <div class="section-total">Итого ФОТ: <strong id="fotTotal">0</strong> руб.</div>
          </div>

          <div class="section-card" id="bonusSection" style="display:none;">
            <div class="section-title">Премия по проектам</div>
            <div id="bonusContent"></div>
            <div class="section-total">Итого премия: <strong id="bonusTotal">0</strong> руб.</div>
          </div>

          <div id="dashboardError" class="error-box mt-3" style="display:none;"></div>
        </div>
      </div>
    </div>

    <script src="./config.js?v=5"></script>
    <script src="./script.js?v=11"></script>
  </body>
</html>
